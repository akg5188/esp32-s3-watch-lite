name: Release Firmware

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

env:
  IDF_DOCKER_IMAGE: espressif/idf:release-v5.5

jobs:
  build-firmware:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package firmware
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            "$IDF_DOCKER_IMAGE" \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /project
              . /opt/esp/idf/export.sh
              idf.py -B build_lite build
              python tools/package_release_firmware.py build_lite firmware-release
            '

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: watch-ai-firmware
          path: firmware-release/*
          if-no-files-found: error

      - name: Upload firmware to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-release/*
